<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>巧布并联照明路，精算小数加减账</title>
  <style>
:root {
  --ink: #17324a;
  --muted: #607183;
  --blue: #2d76c5;
  --green: #2c9368;
  --red: #c94a4a;
  --yellow: #ffd66b;
  --paper: #fffaf0;
  --panel: #ffffff;
  --line: #cad9e6;
  --wire: #3f5263;
  --nav-h: 76px;
}

* { box-sizing: border-box; }

html,
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

body {
  margin: 0;
  color: var(--ink);
  background: url("https://lanselotyichenmashiro.oss-cn-shanghai.aliyuncs.com/PPT1/assets/immersive-classroom-background.png") center center / cover no-repeat fixed;
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
}

button, input, textarea { font: inherit; }
button { touch-action: manipulation; }

.deck-shell {
  min-height: 100vh;
  display: block;
}

.slide-stage {
  width: 100vw;
  height: 100vh;
  min-height: 100vh;
  padding: 0;
  display: grid;
  place-items: center;
}

.slide {
  position: relative;
  width: 100vw;
  height: 100vh;
  max-height: none;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  gap: 12px;
  overflow: hidden;
  padding: 12px;
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

.slide-header {
  position: relative;
  z-index: 6;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.section-badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  background: #e7f2fb;
  color: #255f95;
  font-weight: 800;
  font-size: 16px;
}

.slide h1 {
  margin: 8px 0 0;
  font-size: 34px;
  line-height: 1.15;
  letter-spacing: 0;
}

.slide-number {
  min-width: 76px;
  text-align: right;
  color: #255f95;
  font-weight: 900;
  font-size: 34px;
}
.slide-number span { font-size: 18px; color: var(--muted); }

.pdv2-grid {
  position: relative;
  z-index: 6;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(260px, .68fr) minmax(0, 1.82fr);
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: 20px;
}

.zone-card {
  min-height: 0;
  overflow: auto;
  padding: 18px;
  border: 1px solid rgba(117, 154, 185, .42);
  border-radius: 14px;
  background: rgba(255, 255, 255, .78);
  box-shadow: 0 10px 26px rgba(23, 50, 74, .07);
  backdrop-filter: blur(6px) saturate(1.04);
}

.zone-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  padding: 6px 10px;
  border-radius: 8px;
  background: #1d405d;
  color: white;
  font-weight: 900;
}
.zone-label span {
  color: #cfe6f6;
  font-size: 13px;
}

.context-zone {
  border-color: rgba(240, 201, 91, .48);
  background: rgba(255, 247, 216, .72);
}
.action-zone {
  grid-column: 2;
  grid-row: 1 / span 3;
  display: grid;
  grid-template-rows: auto auto minmax(0, 1fr);
}
.feedback-zone {
  border-color: #bdd8c9;
  background: #effaf4;
}
.explanation-zone {
  border-color: #bfd1e1;
  background: #f4f9fd;
}
.action-goal {
  margin: 0 0 14px;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(255, 244, 206, .86);
  font-weight: 800;
}

.interaction-zone {
  min-height: 0;
  overflow: auto;
}

.deck-nav {
  position: fixed;
  left: 50%;
  bottom: 12px;
  z-index: 80;
  height: auto;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 10px 16px;
  border-radius: 999px;
  background: #17324a;
  color: white;
}

.nav-btn, .check-btn, .action-btn, .choice-btn, .mission-card, .compare-card, .fault-card, .labor-step, .measure-card {
  border: 0;
  border-radius: 8px;
  min-height: 48px;
  cursor: pointer;
  font-weight: 800;
}
.nav-btn {
  width: 56px;
  height: 52px;
  background: var(--yellow);
  font-size: 34px;
  color: #17324a;
}
.nav-btn:disabled { opacity: .45; cursor: not-allowed; }
.check-btn, .action-btn {
  padding: 12px 18px;
  background: var(--yellow);
  color: #17324a;
}
.check-btn { background: #77d7a4; }
.action-btn.secondary { background: #d9e8f3; }
.action-btn.danger { background: #ffd8d2; color: #762d2d; }
.page-meter { min-width: 96px; text-align: center; font-size: 22px; font-weight: 900; }

.cover-layout, .rescue-layout, .lesson-grid, .budget-layout, .material-board, .summary-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  height: 100%;
}

.assistant-card, .goal-list, .interaction-card, .control-card, .question-card, .budget-panel, .budget-result, .quote-card, .measure-card, .sum-card, .measure-card, .measure-card, .measure-layout > *, .measure-card, .measure-card, .material-board > *, .builder-side, .toolbox, .workbench, .feedback {
  border: 1px solid rgba(133, 164, 190, .48);
  border-radius: 14px;
  background: rgba(255, 255, 255, .82);
  padding: 18px;
}

.card-title {
  margin-bottom: 10px;
  color: #255f95;
  font-size: 20px;
  font-weight: 900;
}

.battery-widget {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: center;
  font-weight: 900;
}
.battery-shell {
  height: 28px;
  border: 3px solid #17324a;
  border-radius: 8px;
  padding: 3px;
  background: white;
}
.battery-shell div {
  height: 100%;
  border-radius: 5px;
  background: var(--green);
  transition: width .35s ease;
}
.battery-shell.danger div { background: var(--red); }
.battery-shell.full div { background: var(--green); }

.large-callout {
  padding: 22px;
  border-radius: 8px;
  background: #eaf4fd;
  font-size: 26px;
  font-weight: 900;
}
.goal-list { display: grid; align-content: center; gap: 12px; }
.goal-chip {
  padding: 12px 16px;
  border-radius: 8px;
  background: #fff6d8;
  font-size: 20px;
  font-weight: 800;
}

.video-box {
  display: grid;
  place-items: center;
  text-align: center;
  min-height: 260px;
  border: 3px dashed #83aeca;
  border-radius: 8px;
  background: linear-gradient(135deg, #e8f5ff, #fff5d3);
}
.play-mark {
  width: 86px;
  height: 86px;
  margin: 0 auto 10px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: var(--blue);
  color: white;
  font-size: 42px;
}

.real-video-box {
  width: 100%;
  height: 100%;
  min-height: clamp(320px, 48vh, 620px);
  padding: 0;
  overflow: hidden;
  border: 3px solid rgba(131, 174, 202, .72);
  border-radius: 16px;
  background: #071827;
  box-shadow: 0 18px 42px rgba(23, 50, 74, .16);
}

.lesson-video {
  display: block;
  width: 100%;
  height: 100%;
  max-height: calc(100vh - 310px);
  object-fit: contain;
  background: #071827;
  border-radius: 12px;
}

.rescue-video-layout,
.principle-video-layout {
  min-height: 0;
  height: 100%;
}

.rescue-video-layout .assistant-card {
  display: grid;
  align-content: start;
  gap: 18px;
}

.mission-grid, .compare-board, .fault-board, .labor-steps, .measure-layout {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.mission-card, .compare-card, .fault-card, .labor-step, .measure-card {
  display: grid;
  gap: 8px;
  align-content: center;
  min-height: 130px;
  padding: 16px;
  text-align: left;
  color: var(--ink);
  background: white;
  border: 2px solid var(--line);
}
.mission-card strong, .compare-card strong, .measure-card strong {
  font-size: 24px;
  color: #255f95;
}
.mission-card.selected, .labor-step.selected, .measure-card.selected {
  border-color: var(--green);
  background: #effaf4;
}

.choice-stack {
  display: grid;
  gap: 12px;
  margin-top: 12px;
}
.choice-btn {
  padding: 16px;
  text-align: left;
  background: #edf6ff;
  border: 2px solid #bcd5e8;
  color: var(--ink);
}

.feedback {
  min-height: 58px;
  font-size: 18px;
  line-height: 1.45;
}
.feedback.good { border-color: var(--green); background: #effaf4; }
.feedback.bad { border-color: var(--red); background: #fff0ed; }
.good-text { color: #237653; }
.bad-text { color: #b53d3d; }

.touch-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 12px 0;
}

.circuit-lesson { grid-template-columns: minmax(0, 1.35fr) minmax(300px, .65fr); }
.circuit-board {
  position: relative;
  min-height: 330px;
  border: 2px solid #b8ccdc;
  border-radius: 8px;
  background: #f8fcff;
  overflow: hidden;
}
.circuit-svg, .mini-circuit .circuit-svg {
  display: block;
  width: 100%;
  height: 100%;
  min-height: 320px;
}
.mini-circuit { height: 270px; overflow: hidden; }

.wire {
  stroke: var(--wire);
  stroke-width: 7;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.current {
  opacity: 0;
  stroke: #f0b400;
  stroke-width: 5;
  stroke-dasharray: 10 14;
  stroke-linecap: round;
  fill: none;
  animation: flow 1s linear infinite;
}
.current.on { opacity: 1; }
@keyframes flow { to { stroke-dashoffset: -48; } }
.battery { fill: #fff; stroke: #1d405d; stroke-width: 3; }
.label { fill: #17324a; font-size: 18px; font-weight: 900; }
.pole { fill: #17324a; font-size: 26px; font-weight: 900; }
.bulb-glass { fill: #eef4f8; stroke: #53697a; stroke-width: 3; }
.filament { fill: none; stroke: #8a6b18; stroke-width: 3; }
.bulb-on .bulb-glass {
  fill: #ffe178;
  filter: drop-shadow(0 0 13px #ffc52e);
}
.switch-line {
  stroke: #1d405d;
  stroke-width: 7;
  stroke-linecap: round;
  transform-origin: center;
  transition: transform .2s ease;
}
.switch-open { transform: rotate(-18deg); }
.break-mark { opacity: 0; }
.break-mark line { stroke: var(--red); stroke-width: 7; stroke-linecap: round; }
.break-mark.break-on { opacity: 1; }

.house-mode { position: relative; }
.house-plan {
  position: absolute;
  inset: 48px 36% 22px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  z-index: 0;
  pointer-events: none;
}
.house-room {
  border: 3px solid #b8ccdc;
  border-radius: 8px;
  background: rgba(255,255,255,.72);
  display: grid;
  place-items: center;
  font-size: 24px;
  font-weight: 900;
}
.house-room small { font-size: 14px; color: var(--muted); }
.house-circuit-board { z-index: 1; background: rgba(248,252,255,.72); }

.builder-layout {
  display: grid;
  grid-template-columns: 180px minmax(0, 1fr) 260px;
  gap: 14px;
  height: 100%;
}
.toolbox {
  display: grid;
  align-content: start;
  gap: 8px;
  overflow: auto;
}
.part {
  min-height: 46px;
  display: grid;
  grid-template-columns: 34px 1fr;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 2px solid #9bbbd4;
  border-radius: 8px;
  background: #edf7ff;
  cursor: grab;
  user-select: none;
  touch-action: none;
}
.part span {
  width: 30px;
  height: 30px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: #fff6d8;
  font-weight: 900;
}
.part strong { font-size: 15px; }
.dropped.dragging {
  position: fixed;
  z-index: 20;
  pointer-events: none;
  width: 140px;
  min-height: 52px;
  display: grid;
  place-items: center;
  border: 2px solid var(--blue);
  border-radius: 8px;
  background: white;
}
.workbench {
  position: relative;
  min-height: 360px;
  overflow: hidden;
  background: #f9fcff;
}
.house-outline {
  position: absolute;
  inset: 82px 18px 34px 96px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.room {
  display: grid;
  place-items: start;
  padding: 12px;
  border: 2px solid #aebfce;
  border-radius: 8px;
  background: rgba(255,255,255,.75);
  font-weight: 900;
}
.slot {
  position: absolute;
  z-index: 3;
  width: 118px;
  min-height: 50px;
  display: grid;
  place-items: center;
  padding: 6px;
  border: 2px dashed #6e879b;
  border-radius: 8px;
  background: rgba(255,255,255,.88);
  font-size: 14px;
  text-align: center;
}
.slot.filled {
  border-style: solid;
  border-color: var(--green);
  background: #effaf4;
  font-weight: 900;
}
.bench-lines {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.bench-wire {
  fill: none;
  stroke: #8b99a4;
  stroke-width: 7;
  stroke-linecap: round;
  stroke-dasharray: 12 10;
}

.material-board { grid-template-columns: 1fr 1fr; }
.quote-row, .measure-strip {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #e5edf3;
}
.quote-row small { grid-column: 1 / -1; color: var(--muted); }
.material-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}
.material-table th, .material-table td {
  border: 1px solid #cbd9e5;
  padding: 9px;
  text-align: left;
  vertical-align: middle;
}
.material-table th { background: #e8f4fc; }
.qty-input, .answer-input {
  width: 98px;
  min-height: 44px;
  border: 2px solid #a9bfd1;
  border-radius: 8px;
  padding: 8px;
}
.answer-line {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin: 14px 0;
  font-weight: 900;
}
.formula {
  min-height: 72px;
  padding: 12px;
  border-radius: 8px;
  background: #fff6d8;
  color: #255f95;
  font-size: 23px;
  font-weight: 900;
  word-break: break-word;
}
.status-line {
  min-height: 56px;
  margin-top: 12px;
  font-size: 18px;
  font-weight: 900;
}

.student-answer {
  width: 100%;
  min-height: 110px;
  padding: 12px;
  border: 2px solid #b8ccdc;
  border-radius: 8px;
  resize: vertical;
}
.labor-step span {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: #255f95;
  color: white;
}
.summary-points {
  display: grid;
  gap: 12px;
}
.summary-points div {
  padding: 18px;
  border-radius: 8px;
  background: #fff6d8;
  font-size: 22px;
  font-weight: 900;
}

@media (max-width: 900px) {
  .slide-stage { padding: 0; }
  .slide {
    width: 100vw;
    height: 100vh;
    max-height: none;
    padding: 14px;
    overflow: auto;
  }
  .slide h1 { font-size: 26px; }
  .cover-layout, .rescue-layout, .lesson-grid, .budget-layout, .material-board, .summary-layout, .builder-layout {
    grid-template-columns: 1fr;
  }
  .mission-grid, .compare-board, .fault-board, .labor-steps, .measure-layout { grid-template-columns: 1fr 1fr; }
  .task-strip, .teacher-feedback { align-items: flex-start; flex-direction: column; }
  .real-video-box { min-height: 240px; }
  .lesson-video { max-height: 46vh; }
}

.ppt-v3-home,
.ppt-v3-end {
  display: grid;
  grid-template-rows: 1fr;
  background: transparent;
}

.ppt-cover-layer,
.end-layer {
  min-height: 0;
  display: grid;
  align-content: center;
  justify-items: center;
  text-align: center;
  padding: clamp(32px, 6vw, 88px);
  color: #1f3b57;
}

.cover-kicker {
  margin: 0 0 28px;
  color: #1b8a7a;
  font-size: clamp(22px, 2.4vw, 34px);
  font-weight: 800;
}

.cover-title {
  margin: 0;
  display: grid;
  gap: 18px;
  font-size: clamp(52px, 7vw, 90px);
  line-height: 1.08;
  font-weight: 900;
  letter-spacing: 0;
}

.cover-title span {
  display: block;
}

.cover-subtitle {
  margin: 34px 0 0;
  color: #5c7184;
  font-size: clamp(24px, 2.7vw, 38px);
  font-weight: 800;
}

.cover-meta {
  margin-top: 58px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px 36px;
  color: #40586c;
  font-size: clamp(18px, 1.7vw, 26px);
  font-weight: 700;
}

.end-layer h1 {
  margin: 0;
  color: #1f3b57;
  font-size: clamp(72px, 9vw, 128px);
  line-height: 1;
}

.end-layer p {
  margin: 34px 0 0;
  color: #5c7184;
  font-size: clamp(18px, 2vw, 28px);
  font-weight: 700;
}

.slide[data-page-type="lesson"] .pdv2-grid {
  grid-template-columns: minmax(260px, .68fr) minmax(0, 1.82fr);
  grid-template-rows: auto auto auto;
}

.slide[data-page-type="lesson"] {
  grid-template-rows: auto minmax(0, 1fr) auto;
}

.teacher-zone {
  border-color: rgba(191, 162, 224, .48);
  background: rgba(247, 241, 255, .72);
}

.slide[data-page-type="lesson"] .action-zone {
  grid-column: 2;
  grid-row: 1 / span 4;
}

.slide[data-page-type="lesson"] [hidden] {
  display: none !important;
}

.status-shell {
  position: relative;
  z-index: 8;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: stretch;
}

.status-bar {
  min-height: 46px;
  display: flex;
  align-items: center;
  padding: 10px 14px;
  border: 2px solid #9ec7dc;
  border-radius: 8px;
  background: #eef8ff;
  color: #17324a;
  font-size: 18px;
  font-weight: 900;
}

.step-btn {
  min-width: 118px;
}

.step-complete {
  opacity: .55;
  cursor: default;
}

.step-locked {
  display: none !important;
}

.classroom-character-layer {
  position: fixed;
  inset: 0;
  z-index: 30;
  pointer-events: none;
}

.classroom-character {
  position: fixed;
  width: clamp(220px, 18vw, 340px);
  height: auto;
  object-fit: contain;
  opacity: 0;
  filter: drop-shadow(0 14px 20px rgba(23, 50, 74, .22));
  animation: characterEnter 400ms ease forwards;
}

.classroom-character.pos-left-bottom {
  left: clamp(-72px, -3vw, -24px);
  bottom: -28px;
}

.classroom-character.pos-right-bottom {
  right: clamp(-72px, -3vw, -24px);
  bottom: -28px;
}

.classroom-character.pos-left-middle {
  left: clamp(-96px, -4vw, -38px);
  top: 48%;
  transform: translateY(calc(-50% + 10px));
}

.classroom-character.pos-right-middle {
  right: clamp(-96px, -4vw, -38px);
  top: 48%;
  transform: translateY(calc(-50% + 10px));
}

@keyframes characterEnter {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.classroom-character.pos-left-middle,
.classroom-character.pos-right-middle {
  animation-name: characterEnterMiddle;
}

@keyframes characterEnterMiddle {
  from {
    opacity: 0;
    transform: translateY(calc(-50% + 10px));
  }
  to {
    opacity: 1;
    transform: translateY(-50%);
  }
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"]/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;"
  })[char]);
}

function createLessonVideoHTML(type, src) {
  return `
    <div class="video-player-shell" data-video-shell="${escapeHtml(type)}">
      <video
        class="lesson-video"
        data-lesson-video="${escapeHtml(type)}"
        src="${escapeHtml(src)}"
        controls
        preload="metadata"
        playsinline
      >
        当前浏览器不支持视频播放。
      </video>
      <button class="video-expand-btn" type="button" data-expand-video="${escapeHtml(type)}">
        放大观看
      </button>
    </div>`;
}

function initLessonVideos(scope = document) {
  const videos = Array.from(scope.querySelectorAll(".lesson-video"));

  videos.forEach(video => {
    video.controls = true;

    video.addEventListener("play", () => {
      document.querySelectorAll(".lesson-video, .video-modal-player").forEach(other => {
        if (other !== video) other.pause();
      });
    });
  });

  scope.querySelectorAll("[data-expand-video]").forEach(button => {
    button.addEventListener("click", () => {
      const type = button.dataset.expandVideo;
      const sourceVideo = scope.querySelector(`[data-lesson-video="${type}"]`);
      if (!sourceVideo) return;
      openVideoModal(sourceVideo);
    });
  });
}

function openVideoModal(sourceVideo) {
  document.querySelector(".video-modal-layer")?.remove();

  const currentTime = sourceVideo.currentTime || 0;
  const wasPlaying = !sourceVideo.paused && !sourceVideo.ended;

  document.querySelectorAll(".lesson-video, .video-modal-player").forEach(video => {
    if (video !== sourceVideo) video.pause();
  });
  sourceVideo.pause();

  const layer = document.createElement("div");
  layer.className = "video-modal-layer";
  layer.innerHTML = `
    <div class="video-modal-panel" role="dialog" aria-modal="true" aria-label="放大观看视频">
      <button class="video-modal-close" type="button" aria-label="关闭放大视频">×</button>
      <video
        class="video-modal-player"
        src="${escapeHtml(sourceVideo.currentSrc || sourceVideo.src)}"
        controls
        preload="metadata"
        playsinline
      >
        当前浏览器不支持视频播放。
      </video>
    </div>`;

  document.body.appendChild(layer);

  const modalVideo = layer.querySelector(".video-modal-player");
  const closeBtn = layer.querySelector(".video-modal-close");

  modalVideo.addEventListener("loadedmetadata", () => {
    try {
      modalVideo.currentTime = currentTime;
    } catch (error) {}
    if (wasPlaying) {
      modalVideo.play().catch(() => {});
    }
  });

  let closed = false;
  const syncAndClose = () => {
    if (closed) return;
    closed = true;
    try {
      sourceVideo.currentTime = modalVideo.currentTime || 0;
    } catch (error) {}
    sourceVideo.pause();
    layer.remove();
    document.removeEventListener("keydown", escClose);
  };

  closeBtn.addEventListener("click", syncAndClose);

  layer.addEventListener("click", event => {
    if (event.target === layer) syncAndClose();
  });

  const escClose = event => {
    if (event.key === "Escape" && document.body.contains(layer)) {
      syncAndClose();
    }
  };
  document.addEventListener("keydown", escClose);
}

    next.bedroomBulbOn = complete;
    if (complete) {

    } else if (!next.seriesSwitchOn) {

    next.bedroomBulbOn = Boolean(next.batteryConnected && next.bedroomBranchClosed && next.bedroomSwitchOn);
    if (next.livingRoomBulbOn) next.currentPaths.push("living");
    if (next.bedroomBulbOn) next.currentPaths.push("bedroom");
    if (!next.batteryConnected) next.errors.push("电池未接入完整回路。");
    if (!next.livingRoomBranchClosed) next.errors.push("客厅支路没有闭合。");

    } else if (livingBulbSlot === "bedroom-bulb" || bedroomBulbSlot === "living-bulb" || input["bedroom-bulb"] === "living-bulb" || input["living-bulb"] === "bedroom-bulb") {

    }
    if (input["bedroom-bulb"] !== "bedroom-bulb" || input["bedroom-switch"] !== "bedroom-switch" || input["bedroom-wire"] !== "bedroom-wire") {
      errors.push("卧室支路没有闭合：卧室灯泡、卧室开关和卧室支路导线缺一不可。");
    }

    for (const slot of slots) {
      if (input[slot.id] && input[slot.id] !== slot.accepts) {
        errors.push(`${slot.label}放入了不匹配的元件，应放入“${labelOf(slot.accepts)}”。`);
      }
    }

    const unique = [...new Set(errors)];
    return {
      ok: unique.length === 0,
      errors: unique,
      message: unique.length ? unique.join(" ") : "连接成功：电池、两条支路和两个开关都接入正确，并联照明可以独立控制。"
    };
  }

  function checkBuild(host) {
    return validatePlacements(placements);
  }

  function renderBuildFeedback(host, result) {
    saveDragState(result);
  }

  function restoreSlots(host) {
    Object.entries(placements).forEach(([slotId, partId]) => {
      const slot = host.querySelector(`[data-slot="${slotId}"]`);
      const part = parts.find(item => item.id === partId);
      if (!slot) return;
      slot.classList.add("filled");
      slot.textContent = part ? part.label : partId;
    });
  }

  function slotContaining(input, partId) {
    return Object.keys(input).find(slotId => input[slotId] === partId);
  }

  function branchOf(slotId) {
    return slots.find(slot => slot.id === slotId)?.branch;
  }

  function labelOf(partId) {
    return parts.find(part => part.id === partId)?.label || partId;
  }

  window.QiaobuDragDrop = {
    renderBuilder,
    checkBuild,
    validatePlacements,
    placeInSlot: (slotId, partId) => { placements[slotId] = partId; },
    getPlacements: () => ({ ...placements })
  };
})();


(function () {
  const budgetLimit = 18.00;

  const standardMaterials = [
    { id: "bulb", name: "节能灯泡", price: 5.50, defaultQty: 2, requiredQty: 2, purpose: "客厅、卧室各一盏" },

    { id: "wire-meter", name: "导线约 1 米", price: 12.00, defaultQty: 1, requiredQty: 1, purpose: "完成主线与支路线" }
  ];

  const optimizedMaterials = [
    { id: "battery-box", name: "电池盒", price: 3.50, defaultQty: 1, requiredQty: 1, purpose: "提供电源" },
    { id: "wire", name: "短导线", price: 1.20, defaultQty: 3, requiredQty: 3, purpose: "主回路线、客厅支路、卧室支路" },
    { id: "bulb", name: "小灯泡", price: 2.80, defaultQty: 2, requiredQty: 2, purpose: "两处照明" },
    { id: "switch", name: "开关", price: 1.60, defaultQty: 2, requiredQty: 2, purpose: "双开关独立控制" },
    { id: "base-board", name: "房屋底板", price: 4.90, defaultQty: 1, requiredQty: 1, purpose: "固定模型房屋" },
    { id: "decor", name: "装饰材料", price: 2.30, defaultQty: 1, requiredQty: 0, purpose: "美化展示，可优化" }
  ];

  function pageId() {
    return window.QiaoBuState?.currentPage || 1;
  }

  function pageBudgetState() {
    if (!window.QiaoBuState?.budgetState) return {};
    return window.QiaoBuState.budgetState[pageId()] || {};
  }

  function saveBudgetState(patch) {
    if (!window.QiaoBuState?.budgetState) return;
    window.QiaoBuState.budgetState[pageId()] = {
      ...pageBudgetState(),
      ...patch
    };
    window.updateStatus?.(pageId());
  }

  function renderMaterials(host) {
    host.innerHTML = `
      <div class="material-board" data-budget-module>
        <div class="quote-card">
          <div class="card-title">报价单</div>
          ${standardMaterials.map(item => `<div class="quote-row"><strong>${item.name}</strong><span>${money(item.price)} 元</span><small>${item.purpose}</small></div>`).join("")}
        </div>
        <div class="measure-card">
          <div class="card-title">测量记录</div>
          <div class="measure-strip"><span>客厅主线</span><strong>15.5 cm</strong></div>
          <div class="measure-strip"><span>卧室支线</span><strong>22.8 cm</strong></div>
          <div class="measure-strip"><span>开关引线</span><strong>8.7 cm</strong></div>
          <p>工程预算先看材料，再把相同数位对齐计算。</p>
        </div>
      </div>`;
  }

  function renderBudget(host, optimize = false) {
    const materials = optimize ? optimizedMaterials : standardMaterials;
    const saved = pageBudgetState();
    host.innerHTML = `
      <div class="budget-layout" data-budget-module data-budget-mode="${optimize ? "optimize" : "standard"}">
        <section class="budget-panel">
          <div class="card-title">${optimize ? "优化材料包" : "材料选择"}</div>
          <table class="material-table">
            <thead><tr><th>材料</th><th>单价</th><th>数量</th><th>用途</th></tr></thead>
            <tbody>
              ${materials.map(item => `<tr>
                <td>${item.name}</td>
                <td>${money(item.price)} 元</td>
                <td><input class="qty-input" data-qty="${item.id}" data-testid="qty-${item.id}" type="number" min="0" max="9" value="${saved.qty?.[item.id] ?? item.defaultQty}" aria-label="${item.name}数量"></td>
                <td>${item.purpose}</td>
              </tr>`).join("")}
            </tbody>
          </table>
          <div class="touch-row">
            <button class="action-btn" data-update-budget type="button">生成预算清单</button>
            ${optimize ? `<button class="action-btn secondary" data-omit-decor type="button">去掉装饰材料</button>` : ""}
          </div>
        </section>
        <section class="budget-result">
          <div class="card-title">预算清单与小数加减</div>
          <div class="formula" data-testid="budget-formula" data-formula></div>
          <label class="answer-line">我计算的总价
            <input class="answer-input" data-testid="budget-answer" data-answer inputmode="decimal" value="${saved.answer || ""}" placeholder="${optimize ? "例如 17.20" : "例如 27.70"}">
            元
          </label>
          <button class="action-btn" data-testid="check-budget" data-check-budget type="button">检查预算</button>
        </section>
      </div>`;
    bindBudget(host, materials, optimize);
    updateBudget(host, materials, optimize);
  }

  function bindBudget(host, materials, optimize) {
    host.querySelector("[data-update-budget]").addEventListener("click", () => updateBudget(host, materials, optimize));
    host.querySelector("[data-check-budget]").addEventListener("click", () => checkBudget(host, materials, optimize));
    host.querySelectorAll("[data-qty]").forEach(input => input.addEventListener("input", () => updateBudget(host, materials, optimize)));
    host.querySelector("[data-answer]").addEventListener("input", () => {
      saveBudgetState({ answer: host.querySelector("[data-answer]").value.trim(), message: pageBudgetState().message || "等待操作..." });
    });
    const omitDecor = host.querySelector("[data-omit-decor]");
    if (omitDecor) {
      omitDecor.addEventListener("click", () => {
        host.querySelector('[data-qty="decor"]').value = 0;
        updateBudget(host, materials, optimize);
      });
    }
  }

  function selections(host, materials) {
    return materials.map(item => ({
      ...item,
      qty: Math.max(0, Number(host.querySelector(`[data-qty="${item.id}"]`)?.value || 0))
    }));
  }

  function totalFor(items) {
    return Math.round(items.reduce((sum, item) => sum + item.price * item.qty, 0) * 100) / 100;
  }

  function expressionFor(items) {
    const parts = [];
    for (const item of items) {
      for (let i = 0; i < item.qty; i += 1) parts.push(money(item.price));
    }
    return parts.length ? parts.join(" + ") : "还没有选择材料";
  }

  function updateBudget(host, materials, optimize) {
    const items = selections(host, materials).filter(item => item.qty > 0);
    const total = totalFor(items);
    host.querySelector("[data-formula]").textContent = `${expressionFor(items)} = ${money(total)} 元`;
    const qty = Object.fromEntries(selections(host, materials).map(item => [item.id, item.qty]));
    const previous = pageBudgetState();
    if (optimize) {
      const usable = isFunctional(selections(host, materials), materials);
      saveBudgetState({
        qty,
        total,
        message: previous.message || (usable
          ? `功能检查通过。预算上限 ${money(budgetLimit)} 元，当前 ${money(total)} 元。`
          : "功能未达成：电池、导线、两只灯泡、两个开关、底板必须齐全。")
      });
    } else {
      saveBudgetState({ qty, total, message: previous.message || "输入你的总价后点击检查。注意元、角、分的数位要对齐。" });
    }
  }

  function checkBudget(host, materials, optimize) {
    const items = selections(host, materials);
    const expected = totalFor(items);
    const raw = host.querySelector("[data-answer]").value.trim();
    const answer = Number(raw);
    if (!raw || Number.isNaN(answer) || Math.abs(answer - expected) > 0.005) {
      saveBudgetState({
        answer: raw,
        expected,
        ok: false,
        message: `结果不一致。请检查：小数点是否对齐；是否漏加材料；位数是否错误。正确合计是 ${money(expected)} 元。`
      });
      return { ok: false, expected, reason: "calculation" };
    }
    if (optimize && !isFunctional(items, materials)) {
      saveBudgetState({ answer: raw, expected, ok: false, message: "计算正确，但电路功能未达成，不能算成功方案。" });
      return { ok: false, expected, reason: "function" };
    }
    if (optimize && expected > budgetLimit) {
      saveBudgetState({ answer: raw, expected, ok: false, message: `计算正确，但 ${money(expected)} 元超过 ${money(budgetLimit)} 元预算上限。` });
      return { ok: false, expected, reason: "over-budget" };
    }
    saveBudgetState({
      answer: raw,
      expected,
      ok: true,
      message: optimize ? "挑战成功：电路功能达成，预算没有超过 18.00 元。" : "计算正确：2 个灯泡、2 个开关和 1 米导线合计 27.70 元。"
    });
    return { ok: true, expected };
  }

  function isFunctional(items, materials = optimizedMaterials) {
    const required = Object.fromEntries(materials.map(item => [item.id, item.requiredQty || 0]));
    const selected = Object.fromEntries(items.map(item => [item.id, item.qty]));
    return Object.entries(required).every(([id, qty]) => (selected[id] || 0) >= qty);
  }

  function money(value) {
    return Number(value).toFixed(2);
  }

  window.QiaobuBudget = {
    standardMaterials,
    optimizedMaterials,
    budgetLimit,
    renderMaterials,
    renderBudget,
    totalFor,
    isFunctional,
    money
  };
})();


(function () {
  const stage = document.getElementById("slide-stage");
  const pageNow = document.getElementById("page-now");
  const pageTotal = document.getElementById("page-total");
  const prevBtn = document.getElementById("prev-slide");
  const nextBtn = document.getElementById("next-slide");
  const slides = Array.isArray(window.QiaobuSlides) ? window.QiaobuSlides : [];

  if (!stage || !pageNow || !pageTotal || !prevBtn || !nextBtn) {
    document.body.insertAdjacentHTML("beforeend", `<main class="slide"><h1>课件容器加载失败</h1><p>请检查 slide-stage 与翻页按钮是否存在。</p></main>`);
    return;
  }

  window.QiaoBuState = {
    currentPage: 1,
    pageIndex: 0,
    stepIndex: 0,
    totalPages: Math.max(1, slides.length),
    rescueStarted: Object.create(null),
    circuitState: Object.create(null),
    dragState: Object.create(null),
    budgetState: Object.create(null)
  };

  const state = window.QiaoBuState;

  function updateStatus(pageId) {
    let msg = "等待操作...";

    if (state.rescueStarted[pageId]) msg = "✔ 救援已启动：咕嘎电路恢复中";
    if (state.dragState[pageId]?.message) msg = state.dragState[pageId].message;
    if (state.budgetState[pageId]?.message) msg = state.budgetState[pageId].message;
    if (state.circuitState[pageId]?.message) msg = state.circuitState[pageId].message;
    if (state.circuitState[pageId]?.error) msg = "❌ 电路错误：" + state.circuitState[pageId].error;

    const el = document.getElementById("statusBar");
    if (el) el.innerText = msg;
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"]/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;"
    })[char]);
  }

  function renderPage(pageId) {
    state.currentPage = Math.max(1, Math.min(state.totalPages, Number(pageId) || 1));
    state.pageIndex = state.currentPage - 1;
    state.stepIndex = 0;
    stage.replaceChildren();

    const slide = slides[state.currentPage - 1];
    if (!slide) renderFallbackPage("课件数据为空，请检查 QiaobuSlides。");
    else if (slide.type === "home") renderHomePage(slide);
    else if (slide.type === "end") renderEndPage(slide);
    else renderLessonPage(slide);

    pageNow.textContent = String(state.currentPage);
    pageTotal.textContent = String(state.totalPages);
    prevBtn.disabled = state.currentPage === 1;
    nextBtn.disabled = state.currentPage === state.totalPages;
    updateStatus(state.currentPage);
    return state.currentPage;
  }

  function nextPage() {
    return renderPage(state.currentPage + 1);
  }

  function prevPage() {
    return renderPage(state.currentPage - 1);
  }

  function nextStep() {
    if (state.currentPage < 2 || state.currentPage > 16) return state.stepIndex;
    state.stepIndex = Math.min(3, state.stepIndex + 1);
    const article = stage.querySelector(".slide[data-page-type='lesson']");
    if (article) applyStepVisibility(article);
    updateStatus(state.currentPage);
    return state.stepIndex;
  }

  function renderFallbackPage(message) {
    const article = document.createElement("article");
    article.className = "slide";
    article.innerHTML = `<section class="zone-card"><h1>加载提示</h1><p>${escapeHtml(message)}</p></section>`;
    stage.appendChild(article);
  }

  function renderHomePage(slide) {
    const article = document.createElement("article");
    article.className = "slide ppt-v3-home";
    article.dataset.pageId = String(state.currentPage);
    article.dataset.pageType = "home";

      <section class="ppt-cover-layer" aria-label="课程封面">
        <p class="cover-kicker">${escapeHtml(slide.subjects || slide.section)}</p>

          <span>精算小数加减账</span>

          <span>${escapeHtml(slide.school || "")}</span>
        </div>
      </section>`;
    stage.appendChild(article);
  }

  function renderEndPage(slide) {
    const article = document.createElement("article");

    article.dataset.pageId = String(state.currentPage);
    article.dataset.pageType = "end";
    article.innerHTML = `
      <section class="end-layer" aria-label="结束页">
        <h1>${escapeHtml(slide.title || "谢谢观看")}</h1>

      3: { role: "idea", position: "action-empty-right" },

      6: { role: "question", position: "action-empty-left" },
      9: { role: "idea", position: "action-empty-center" },

      13: { role: "idea", position: "action-empty-right" },

    const assets = {

      },

        alt: "课堂思考角色"
      }

    const asset = assets[item.role];
    return `
      <div class="classroom-character-layer" aria-hidden="true">
        <img class="classroom-character pos-${item.position}" src="${asset.src}" alt="${asset.alt}">
      </div>`;
  }

  function applyStepVisibility(article) {
    const thresholds = {
      context: 0,
      teacher: 1,
      action: 2,
      interaction: 3
    };

    article.querySelectorAll("[data-step-zone]").forEach(zone => {
      const visible = state.stepIndex >= thresholds[zone.dataset.stepZone];
      zone.hidden = !visible;
      zone.classList.toggle("step-locked", !visible);
    });

    const interaction = article.querySelector("[data-slide-body]");
    const interactionReady = state.stepIndex >= thresholds.interaction;
    if (interaction) {
      interaction.hidden = !interactionReady;
      interaction.classList.toggle("step-locked", !interactionReady);
      interaction.querySelectorAll("button, input, textarea, select").forEach(control => {
        control.disabled = !interactionReady;
      });
    }

    const stepButton = article.querySelector("[data-next-step]");
    if (stepButton) {
      const complete = state.stepIndex >= thresholds.interaction;
      stepButton.textContent = complete ? "步骤完成" : "下一步";
      stepButton.disabled = complete;
      stepButton.classList.toggle("step-complete", complete);
    }
  }

  function renderLessonPage(slide) {

        </section>
        <section class="zone-card teacher-zone" data-testid="zone-teacher" data-step-zone="teacher">
          <div class="zone-label">教师讲解 <span>Guide</span></div>
          <p>${escapeHtml(slide.feedback || "")}</p>
        </section>
        <section class="zone-card action-zone" data-testid="zone-action" data-step-zone="action">
          <div class="zone-label">操作区<span>Action</span></div>
          <p class="action-goal">${escapeHtml(slide.task || "")}</p>
          <div class="interaction-zone" data-slide-body></div>
        </section>
      </section>
      <div class="status-shell">
        <div id="statusBar" class="status-bar">等待操作...</div>
        <button class="action-btn secondary step-btn" data-testid="next-step" data-next-step type="button">下一步</button>
      </div>
      ${renderCharacterOverlay(state.currentPage)}`;
    stage.appendChild(article);
    renderInteraction(slide, article.querySelector("[data-slide-body]"));
    article.querySelector("[data-next-step]")?.addEventListener("click", nextStep);
    applyStepVisibility(article);
  }

  function renderInteraction(slide, body) {
    if (!body || !slide) return;
    const handlers = {
      rescue: renderRescue,
      mission: renderMission,
      choice: renderChoice,
      series: target => window.QiaobuCircuit.drawSeries(target),
      quickCheck: renderQuickCheck,
      parallel: target => window.QiaobuCircuit.drawParallel(target),
      principle: target => window.QiaobuCircuit.drawPrinciple(target),
      compare: renderCompare,

        };
        updateStatus(state.currentPage);
      });
    });
  }

  function renderQuickCheck(body, slide) {
    body.innerHTML = `
      <div class="lesson-grid">
        <div class="question-card">
          <h2>${escapeHtml(slide.question)}</h2>
          <textarea class="student-answer" aria-label="学生解释" placeholder="请写下你的解释"></textarea>
          <button class="action-btn" data-show-answer type="button">查看反馈</button>
        </div>
      </div>`;
    body.querySelector("[data-show-answer]").addEventListener("click", () => {
      state.circuitState[state.currentPage] = {
        ...(state.circuitState[state.currentPage] || {}),
        message: slide.answer,
        error: ""
      };
      updateStatus(state.currentPage);
    });
  }

  function renderCompare(body) {
    body.innerHTML = `
      <div class="compare-board">
        <button class="compare-card" type="button" data-compare="series"><strong>串联</strong><span>一条通路，一处断开，全路受影响。</span></button>
        <button class="compare-card recommended" type="button" data-compare="parallel"><strong>并联</strong><span>多条支路，互不干扰，适合家庭照明。</span></button>
        <button class="compare-card" type="button" data-compare="home"><strong>家庭需求</strong><span>客厅看书、卧室休息，需要分别开关。</span></button>
      </div>`;
    body.querySelectorAll("[data-compare]").forEach(card => card.addEventListener("click", () => {
      const ok = card.dataset.compare === "parallel";
      const message = ok
        ? "判断正确：并联结构满足双开关双灯独立控制。"
        : "再想想：如果一处变化影响全部，就不适合家庭分区照明。";
      state.circuitState[state.currentPage] = { ...(state.circuitState[state.currentPage] || {}), message, error: ok ? "" : message };
      updateStatus(state.currentPage);
    }));
  }

  function renderFault(body) {
    const faults = {
      battery: "电池未接入完整回路：电流无法从正极出发再回到负极。",
      same: "两个灯泡在同一路径，不能独立控制。",
      branch: "某一支路没有闭合：灯泡、开关或支路导线缺一不可。"
    };
    body.innerHTML = `
      <div class="fault-board">
        <button class="fault-card" data-fault="battery" type="button">电池缺口</button>
        <button class="fault-card" data-fault="same" type="button">同一路径</button>
        <button class="fault-card" data-fault="branch" type="button">支路断开</button>
      </div>`;
    body.querySelectorAll("[data-fault]").forEach(button => button.addEventListener("click", () => {
      state.circuitState[state.currentPage] = {
        ...(state.circuitState[state.currentPage] || {}),
        error: faults[button.dataset.fault],
        message: faults[button.dataset.fault]
      };
      updateStatus(state.currentPage);
    }));
  }

  function renderMeasurement(body, slide) {
    body.innerHTML = `
      <div class="measure-layout">
        ${slide.lengths.map(([name, value]) => `<button class="measure-card" data-length="${value}" type="button"><span>${escapeHtml(name)}</span><strong>${value.toFixed(1)} cm</strong></button>`).join("")}
        <div class="sum-card"><strong>合计</strong><span data-length-sum>点击三段长度</span></div>
      </div>`;
    let total = 0;
    const clicked = new Set();
    body.querySelectorAll("[data-length]").forEach(card => card.addEventListener("click", () => {
      if (!clicked.has(card)) {
        clicked.add(card);
        card.classList.add("selected");
        total += Number(card.dataset.length);
      }
      body.querySelector("[data-length-sum]").textContent = `${total.toFixed(1)} cm`;
      state.budgetState[state.currentPage] = {
        ...(state.budgetState[state.currentPage] || {}),
        message: `已测量 ${total.toFixed(1)} cm，测量值越准确，预算越不容易超标。`
      };
      updateStatus(state.currentPage);
    }));
  }

  function renderLabor(body) {
    const steps = ["空间定位：在模型上精准标出孔位。", "精准作业：精确剥除导线绝缘皮。", "逻辑布线：沿盒壁固定导线。", "实效检测：分别合上开关，看灯泡能否独立点亮。"];
    body.innerHTML = `
      <div class="labor-steps">${steps.map((step, index) => `<button class="labor-step" data-labor="${index}" type="button"><span>${index + 1}</span>${escapeHtml(step)}</button>`).join("")}</div>`;
    const done = new Set();
    body.querySelectorAll("[data-labor]").forEach(button => button.addEventListener("click", () => {
      done.add(button.dataset.labor);
      button.classList.add("selected");
      state.rescueStarted[state.currentPage] = done.size === steps.length;
      state.budgetState[state.currentPage] = {
        ...(state.budgetState[state.currentPage] || {}),
        message: done.size === steps.length ? "流程完成：可以进入课堂展示。" : `已完成 ${done.size}/4 步。`
      };
      updateStatus(state.currentPage);
    }));
  }

  prevBtn.addEventListener("click", prevPage);
  nextBtn.addEventListener("click", nextPage);
  document.addEventListener("keydown", event => {
    if (event.key === "ArrowLeft") prevPage();
    if (event.key === "ArrowRight") nextPage();
  });

  window.updateStatus = updateStatus;
  window.renderPage = renderPage;
  window.nextPage = nextPage;
  window.prevPage = prevPage;
  window.nextStep = nextStep;
  window.QiaobuApp = {
    state,
    renderPage,
    nextPage,
    prevPage,
    nextStep,
    getStepIndex: () => state.stepIndex,
    updateStatus
  };
  renderPage(1);
})();

  </script>
</body>
</html>
